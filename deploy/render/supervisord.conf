[supervisord]

nodaemon=true


[program:backend]

directory=/app

command=/app/.venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000

autostart=true

autorestart=true

priority=10

stdout_logfile=/dev/stdout

stderr_logfile=/dev/stderr

stdout_logfile_maxbytes=0

stderr_logfile_maxbytes=0


[program:nginx]

command=/usr/sbin/nginx -g "daemon off;"

autostart=true

autorestart=true

priority=20

stdout_logfile=/dev/stdout

stderr_logfile=/dev/stderr

stdout_logfile_maxbytes=0

stderr_logfile_maxbytes=0
